# Release FormaUI to Maven Central via the Central Portal.
#
# Automates docs/RELEASING.md end-to-end EXCEPT the final irreversible click:
# the deployment is uploaded as USER_MANAGED, so a human reviews the validated
# file list on central.sonatype.com and presses Publish (then tags).
#
# Trigger is manual (workflow_dispatch) by design: the runbook tags AFTER a
# successful publish, versions on Central are immutable, and the version is
# hardcoded in the build files — typing it here is the "are you sure" gate.
#
# Required repository secrets:
#   SIGNING_KEY              ASCII-armored PGP private key (multiline, as-is)
#   SIGNING_PASSWORD         its passphrase
#   CENTRAL_TOKEN_USERNAME   Central Portal user-token name
#   CENTRAL_TOKEN_PASSWORD   Central Portal user-token password
#
# NOTE: the Publisher API endpoint/auth shape (upload + status below) should be
# re-verified against https://central.sonatype.org/publish/publish-portal-api/
# before the first run. If the API step fails, download the bundle from the
# workflow artifact and upload it manually per docs/RELEASING.md — the manual
# path always remains available.
name: Release to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release — must match the version in the build files (e.g. 0.1.0)"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      # Automates the runbook's "#1 release mistake" check: the dispatched
      # version must equal the version hardcoded in BOTH build files
      # (the publishing convention plugin is authoritative for the artifact).
      - name: Version guard
        run: |
          PLUGIN_VERSION="$(sed -n 's/^version = "\(.*\)"$/\1/p' build-logic/src/main/kotlin/formaui.publishing.gradle.kts)"
          ROOT_VERSION="$(sed -n 's/^version = "\(.*\)"$/\1/p' build.gradle.kts)"
          echo "input=${VERSION} plugin=${PLUGIN_VERSION} root=${ROOT_VERSION}"
          if [ -z "${PLUGIN_VERSION}" ] || [ "${VERSION}" != "${PLUGIN_VERSION}" ] || [ "${VERSION}" != "${ROOT_VERSION}" ]; then
            echo "::error::Version mismatch — bump the build files first (docs/RELEASING.md step 1)."
            exit 1
          fi

      - name: Full test gate
        run: >
          ./gradlew
          :core:testAndroidHostTest
          :components:testAndroidHostTest
          :core:compileKotlinWasmJs
          :components:compileKotlinWasmJs
          :sample:assembleDebug

      - name: Build signed Central Portal bundle
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          if [ -z "${SIGNING_KEY}" ]; then
            echo "::error::SIGNING_KEY secret is not set — refusing to build an unsigned release bundle."
            exit 1
          fi
          ./gradlew publishAllPublicationsToCentralBundleRepository

      # The group directory (io/ today, dev/ after a namespace switch) must sit
      # at the ZIP ROOT — the most common Portal upload rejection (runbook).
      - name: Zip bundle
        run: |
          (cd build/central-bundle && zip -qr "../formaui-${VERSION}-bundle.zip" .)
          echo "Bundle root entries:"
          unzip -l "build/formaui-${VERSION}-bundle.zip" | head -15
          if ! unzip -l "build/formaui-${VERSION}-bundle.zip" | awk '{print $4}' | grep -qE '^(io|dev)/'; then
            echo "::error::Group directory is not at the zip root."
            exit 1
          fi

      # Fallback for a failed/incorrect API step: download this artifact and
      # upload it in the browser per docs/RELEASING.md.
      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: central-bundle-${{ inputs.version }}
          path: build/formaui-${{ inputs.version }}-bundle.zip
          if-no-files-found: error

      - name: Upload to Central Portal (USER_MANAGED)
        id: upload
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
        run: |
          TOKEN="$(printf '%s:%s' "${CENTRAL_TOKEN_USERNAME}" "${CENTRAL_TOKEN_PASSWORD}" | base64 -w0)"
          DEPLOYMENT_ID="$(curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -F "bundle=@build/formaui-${VERSION}-bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?name=formaui-${VERSION}&publishingType=USER_MANAGED")"
          echo "Deployment ID: ${DEPLOYMENT_ID}"
          echo "deployment_id=${DEPLOYMENT_ID}" >> "${GITHUB_OUTPUT}"

      - name: Wait for Portal validation
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          DEPLOYMENT_ID: ${{ steps.upload.outputs.deployment_id }}
        run: |
          TOKEN="$(printf '%s:%s' "${CENTRAL_TOKEN_USERNAME}" "${CENTRAL_TOKEN_PASSWORD}" | base64 -w0)"
          for i in $(seq 1 30); do
            sleep 20
            RESPONSE="$(curl -sS -X POST -H "Authorization: Bearer ${TOKEN}" \
              "https://central.sonatype.com/api/v1/publisher/status?id=${DEPLOYMENT_ID}")"
            STATE="$(echo "${RESPONSE}" | jq -r '.deploymentState // empty')"
            echo "[${i}/30] state: ${STATE:-unknown}"
            case "${STATE}" in
              VALIDATED|PUBLISHED)
                echo "${RESPONSE}" | jq .
                exit 0
                ;;
              FAILED)
                echo "::error::Portal validation FAILED:"
                echo "${RESPONSE}" | jq .
                exit 1
                ;;
            esac
          done
          echo "::error::Timed out after 10 min — check https://central.sonatype.com/publishing/deployments"
          exit 1

      - name: Job summary
        if: success()
        env:
          DEPLOYMENT_ID: ${{ steps.upload.outputs.deployment_id }}
        run: |
          {
            echo "## Release ${VERSION} — validated, awaiting manual publish"
            echo ""
            echo "- Deployment ID: \`${DEPLOYMENT_ID}\`"
            echo "- Review & publish: <https://central.sonatype.com/publishing/deployments>"
            echo ""
            echo "### Remaining manual steps (docs/RELEASING.md)"
            echo "1. Inspect the validated deployment's file list on the portal."
            echo "2. Click **Publish** — irreversible; versions are immutable."
            echo "3. Tag: \`git tag v${VERSION} && git push origin v${VERSION}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
