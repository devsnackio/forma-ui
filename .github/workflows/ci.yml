# CI gate for FormaUI: the same authoritative checks QA runs locally
# (docs/RELEASING.md "full gate"). No signing, no secrets — safe on PRs;
# the publishing plugin skips signing when no key is present.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Full test gate
        run: >
          ./gradlew
          :core:testAndroidHostTest
          :components:testAndroidHostTest
          :core:compileKotlinWasmJs
          :components:compileKotlinWasmJs
          :sample:assembleDebug

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
